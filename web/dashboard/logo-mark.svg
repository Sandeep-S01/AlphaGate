<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" role="img" aria-labelledby="title desc">
  <title id="title">AlphaGate logo mark</title>
  <desc id="desc">An alpha-shaped gate with a protected trading signal through the center.</desc>
  <defs>
    <linearGradient id="ag-gate" x1="12" y1="64" x2="60" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2cf6b3"/>
      <stop offset="0.5" stop-color="#56ccff"/>
      <stop offset="1" stop-color="#9b8cff"/>
    </linearGradient>
    <filter id="ag-glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.96 0 0 0 0 0.70 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>
  <rect x="5" y="5" width="62" height="62" rx="16" fill="#0b0d14" stroke="#2d3345" stroke-width="2"/>
  <path d="M15 58 31 13h10l16 45H46.5l-3.3-10H28.8L25.5 58H15Z" fill="url(#ag-gate)" filter="url(#ag-glow)"/>
  <path d="M31.4 39h9.2L36 25.2 31.4 39Z" fill="#11131d"/>
  <path d="M21 58V44h9v14h-9Zm21 0V44h9v14h-9Z" fill="#0b0d14"/>
  <path d="M21 47h30" stroke="#f7fafc" stroke-width="4" stroke-linecap="round"/>
  <path d="M25 35h7l3.7-8.2L41 49l3.3-10H49" fill="none" stroke="#2cf6b3" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
